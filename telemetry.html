<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Error Telemetry | Expert EF</title>
  <meta name="description" content="Internal telemetry dashboard for reviewing client-side errors captured by the ExEF site monitoring system.">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="canonical" href="https://executivefunctioninginstitute.com/telemetry.html" />
  <link rel="icon" href="favicon.svg" />
  <meta property="og:image" content="https://www.theexecutivefunctioninginstitute.com/images/og-image.svg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  <main id="main-content" class="section">
    <div class="container">
      <h1>Client Error Telemetry (Prototype)</h1>
      <p class="lead">This page displays browser-captured errors stored in localStorage by <code>ExEF.Telemetry</code>.</p>
      <div style="display:flex;gap:var(--space-sm);flex-wrap:wrap;margin-bottom:var(--space-md);">
        <button class="btn btn--secondary" id="refresh-errors">Refresh</button>
        <button class="btn btn--secondary" id="clear-errors">Clear Errors</button>
        <a class="btn btn--secondary" href="dashboard.html">Back to Dashboard</a>
      </div>
      <div id="error-list"></div>
    </div>
  </main>
  <script src="js/auth.min.js"></script>
  <script src="js/main.min.js" defer></script>
  <script src="js/telemetry-inline.min.js"></script>
</body>
</html>
