  <!-- Top gold line -->
  <rect y="0" width="1200" height="6" fill="#7c5a2b"/>

  <!-- Main content area -->
  <!-- Institution name -->
  <text x="80" y="200" font-family="Georgia, serif" font-size="28" fill="#7c5a2b" font-weight="bold" letter-spacing="2">THE EXECUTIVE FUNCTIONING INSTITUTE</text>

  <!-- Main headline -->
  <text x="80" y="290" font-family="Georgia, serif" font-size="64" fill="#274960" font-weight="bold">Science-Based</text>
  <text x="80" y="370" font-family="Georgia, serif" font-size="64" fill="#274960" font-weight="bold">EF Coaching</text>
