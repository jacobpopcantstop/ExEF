  <!-- E letterform — clean, balanced -->
  <rect x="16" y="16" width="22" height="5"  rx="1" fill="#e8f1f8"/>
  <rect x="16" y="16" width="5"  height="32" rx="1" fill="#e8f1f8"/>
  <rect x="16" y="29" width="17" height="5"  rx="1" fill="#c9a84c"/>
  <rect x="16" y="43" width="22" height="5"  rx="1" fill="#e8f1f8"/>
</svg>
