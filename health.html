<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EFI Health Check</title>
  <meta name="description" content="Health check endpoint for the Executive Functioning Institute site monitoring.">
  <link rel="canonical" href="https://executivefunctioninginstitute.com/health.html" />
  <meta property="og:image" content="https://www.theexecutivefunctioninginstitute.com/images/og-image.svg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <style>
    :root {
      color-scheme: light dark;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    body {
      margin: 0;
      padding: 24px;
      background: #0f1720;
      color: #e8eef4;
    }
    main {
      max-width: 880px;
      margin: 0 auto;
    }
    .panel {
      background: rgba(9, 14, 20, 0.88);
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 1.25rem;
      margin: 0 0 12px;
    }
    p, li {
      line-height: 1.6;
    }
    ul {
      padding-left: 18px;
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .ok { color: #6ee7b7; }
    .err { color: #f87171; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  <main id="main-content">
    <section class="panel">
      <h1>EFI Health</h1>
      <pre id="health-summary">{"status":"loading"}</pre>
    </section>
    <section class="panel">
      <h1>Public Checks</h1>
      <ul id="health-checks"></ul>
    </section>
    <section class="panel">
      <h1>Notes</h1>
      <p>This page is intentionally public-safe. It only checks static delivery and non-secret function endpoints.</p>
    </section>
  </main>
  <script src="js/health.min.js" defer></script>
</body>
</html>
