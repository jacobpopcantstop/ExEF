<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#f5f1e8"/>

  <!-- Left accent bar -->
  <rect width="8" height="630" fill="#274960"/>

  <!-- Bottom accent bar -->
