name: uptime-check

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe key EFI routes
        env:
          BASE_URL: https://executivefunctioninginstitute.com
        run: |
          set -euo pipefail
          paths=("/" "/modules/1/" "/search/" "/verify/" "/health.html")
          for p in "${paths[@]}"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL$p")
            echo "$p -> $code"
            if [ "$code" -lt 200 ] || [ "$code" -ge 400 ]; then
              echo "Probe failed for $p"
              exit 1
            fi
          done

      - name: Close existing uptime alert issue after recovery
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'EFI uptime alert';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'uptime-alert'
            });
            const match = issues.find(issue => issue.title === title);
            if (!match) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: match.number,
              body: `Recovery confirmed by workflow run ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: match.number,
              state: 'closed'
            });

      - name: Open or update uptime alert issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'EFI uptime alert';
            const body = [
              'The scheduled EFI uptime probe failed.',
              '',
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `Triggered at: ${new Date().toISOString()}`,
              '',
              'Probed routes:',
              '- /',
              '- /modules/1/',
              '- /search/',
              '- /verify/',
              '- /health.html'
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'uptime-alert'
            });
            const match = issues.find(issue => issue.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['uptime-alert']
            });
